name: Detective Conan — DoodStream Only

on:
  schedule:
    - cron: '0 13 * * 6'   # Saturdays 13:00 UTC (covers CST + CDT)

  workflow_dispatch:
    inputs:

      # ════════════════════════════════════════════════════════════════════
      # SECTION 1 — MAGNETS
      # ════════════════════════════════════════════════════════════════════
      magnet_links:
        description: |
          [MAGNETS] Batch magnet links (one per line or comma-separated).
          Auto-detects Movie vs Episode from each filename.
          Leave blank to use Nyaa search instead.
        required: false
        default: ''

      select_files:
        description: |
          [MAGNETS] Pick specific file(s) from the torrent.
            Single:   32        Range:   32-35
            Specific: 32,40     Mix:     32,40-42
          Leave blank to download everything.
        required: false
        default: ''

      # ════════════════════════════════════════════════════════════════════
      # SECTION 2 — EPISODES
      # ════════════════════════════════════════════════════════════════════
      episode_override:
        description: |
          [EPISODES] Episode(s) to download.
            Single: 1000   Range: 1000-1005   Specific: 1000,1005   Mix: 1000,1003-1005
          Leave blank to auto-calculate this week's episode.
        required: false
        default: ''

      nyaa_uploader_url:
        description: |
          [EPISODES] Custom Nyaa.si uploader URL.
          e.g. https://nyaa.si/user/Erai-raws
          Leave blank for SubsPlease (default).
        required: false
        default: ''

      custom_search_query:
        description: |
          [EPISODES] Override the Nyaa search query entirely.
        required: false
        default: ''

      ep_hs_title:
        description: '[EPISODES] Hard-sub DoodStream title. Use {ep} as placeholder.'
        required: false
        default: 'Detective Conan - {ep} HS'

      ep_ss_title:
        description: '[EPISODES] Soft-sub DoodStream title. Use {ep} as placeholder.'
        required: false
        default: 'Detective Conan - {ep} SS'

      # ════════════════════════════════════════════════════════════════════
      # SECTION 3 — MOVIES
      # ════════════════════════════════════════════════════════════════════
      movie_mode:
        description: |
          [MOVIES] Force all files as movies (set to 1).
          Leave blank for auto-detection from filename.
        required: false
        default: '0'

      movie_hs_title:
        description: '[MOVIES] Hard-sub DoodStream title. Use {num} as placeholder.'
        required: false
        default: 'Detective Conan Movie - {num} HS'

      movie_ss_title:
        description: '[MOVIES] Soft-sub DoodStream title. Use {num} as placeholder.'
        required: false
        default: 'Detective Conan Movie - {num} SS'

env:
  BASE_EPISODE: '1193'
  BASE_DATE: '2026-03-14'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/az_3*
          sudo rm -rf /usr/local/graalvm
          echo "Disk after cleanup:"
          df -h /

      - name: Install system dependencies (aria2, ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 ffmpeg

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run Conan automation (DoodStream only)
        run: python conan_automation_dood_only.py
        env:
          # DoodStream — both SS and HS go here
          DOODSTREAM_API_KEY:   ${{ secrets.DOODSTREAM_API_KEY }}
          HARD_SUB_FOLDER_ID:   ${{ secrets.HARD_SUB_FOLDER_ID }}
          SOFT_SUB_FOLDER_ID:   ${{ secrets.SOFT_SUB_FOLDER_ID }}
          HTML_FILE:            index.html

          # MAGNETS
          MAGNET_LINKS:         ${{ github.event.inputs.magnet_links        || '' }}
          SELECT_FILES:         ${{ github.event.inputs.select_files         || '' }}

          # EPISODES
          EPISODE_OVERRIDE:     ${{ github.event.inputs.episode_override    || '' }}
          NYAA_UPLOADER_URL:    ${{ github.event.inputs.nyaa_uploader_url   || '' }}
          CUSTOM_SEARCH:        ${{ github.event.inputs.custom_search_query || '' }}
          HS_TITLE_TPL:         ${{ github.event.inputs.ep_hs_title         || 'Detective Conan - {ep} HS' }}
          SS_TITLE_TPL:         ${{ github.event.inputs.ep_ss_title         || 'Detective Conan - {ep} SS' }}

          # MOVIES
          MOVIE_MODE:           ${{ github.event.inputs.movie_mode          || '0' }}
          MOVIE_HS_TITLE_TPL:   ${{ github.event.inputs.movie_hs_title      || 'Detective Conan Movie - {num} HS' }}
          MOVIE_SS_TITLE_TPL:   ${{ github.event.inputs.movie_ss_title      || 'Detective Conan Movie - {num} SS' }}
